apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gravital-sound-relay.fullname" . }}
  labels:
    {{- include "gravital-sound-relay.labels" . | nindent 4 }}
data:
  config.toml: |
    udp_bind = "0.0.0.0:{{ .Values.ports.udp }}"
    ws_bind = "0.0.0.0:{{ .Values.ports.ws }}"
    observability_bind = "0.0.0.0:{{ .Values.ports.metrics }}"
    session_ttl_secs = {{ .Values.config.session_ttl_secs }}
    max_sessions = {{ .Values.config.max_sessions }}
