# Compose stack mínimo para correr `gs-relay` localmente con Prometheus.
# Uso:
#   cd crates/gravital-sound-relay
#   docker compose up --build
#
# El relay escucha:
#   - UDP 9000  para audio
#   - TCP 9090  para WebSocket
#   - TCP 9100  para /metrics + /healthz
# Prometheus:
#   - http://localhost:9091

version: "3.9"

services:
  gs-relay:
    build:
      context: ../..
      dockerfile: crates/gravital-sound-relay/Dockerfile
    container_name: gs-relay
    restart: unless-stopped
    ports:
      - "9000:9000/udp"
      - "9090:9090/tcp"
      - "9100:9100/tcp"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    environment:
      GS_LOG: info

  prometheus:
    image: prom/prometheus:latest
    container_name: gs-relay-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - gs-relay
