name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install native audio deps
        run: sudo apt-get update && sudo apt-get install -y libopus-dev libasound2-dev pkg-config
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            audio_deps: sudo apt-get update && sudo apt-get install -y libopus-dev libasound2-dev pkg-config
          - os: macos-latest
            audio_deps: brew install opus
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install native audio deps
        run: ${{ matrix.audio_deps }}
      - run: cargo test --workspace --all-targets

  test-no-default:
    name: test (no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: >
          cargo test
          -p gravital-sound-core
          -p gravital-sound-metrics
          -p gravital-sound-transport
          --no-default-features

  ffi-header:
    name: cbindgen header + gcc smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install native audio deps
        run: sudo apt-get update && sudo apt-get install -y libopus-dev libasound2-dev pkg-config
      - run: cargo build -p gravital-sound-ffi --release
      - run: cc -I crates/gravital-sound-ffi/include -c crates/gravital-sound-ffi/tests/c_smoke.c -o /tmp/c_smoke.o

  cross-wasm:
    name: check wasm32 core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --target wasm32-unknown-unknown -p gravital-sound-core

  cross-aarch64:
    name: check aarch64-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: >
          cargo check
          --target aarch64-unknown-linux-gnu
          --no-default-features
          -p gravital-sound-core
          -p gravital-sound-transport

  python-sdk:
    name: python sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: pip install maturin pytest
      - working-directory: sdks/python
        run: |
          maturin build --release --strip --out dist
          pip install --force-reinstall dist/*.whl
          pytest tests/
